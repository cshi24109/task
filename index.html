<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出席管理アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>出席管理アプリ</h1>
        <select>
            <option>2026年度 前期</option>
            <option>2026年度 後期</option>
        </select>
    </header>

    <main>
        <table>
            <thead>
                <tr>
                    <th style="width: 60px;">時限</th>
                    <th>月曜日</th>
                    <th>火曜日</th>
                    <th>水曜日</th>
                    <th>木曜日</th>
                    <th>金曜日</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="time-col">1</td>
                    <td>
                        <div class="course-card required">
                            <div>
                                <span class="category-badge">必修</span>
                                <div class="course-name">英語A</div>
                            </div>
                            <div class="absence-zone">
                                <span>欠席: <b>1</b>回</span>
                                <div class="btn-zone"><button>-</button> <button>+</button></div>
                            </div>
                        </div>
                    </td>
                    <td></td><td></td><td></td><td></td>
                </tr>
                <tr>
                    <td class="time-col">2</td>
                    <td></td><td></td><td></td><td></td>
                    <td>
                        <div class="course-card general">
                            <div>
                                <span class="category-badge">教養</span>
                                <div class="course-name">心理学基礎</div>
                            </div>
                            <div class="absence-zone">
                                <span>欠席: <b>0</b>回</span>
                                <div class="btn-zone"><button>-</button> <button>+</button></div>
                            </div>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td class="time-col">3</td>
                    <td></td><td></td>
                    <td>
                        <div class="course-card major">
                            <div>
                                <span class="category-badge">専門</span>
                                <div class="course-name">データ構造論</div>
                            </div>
                            <div class="absence-zone">
                                <span>欠席: <b>2</b>回</span>
                                <div class="btn-zone"><button>-</button> <button>+</button></div>
                            </div>
                        </div>
                    </td>
                    <td></td><td></td>
                </tr>
                <tr><td class="time-col">4</td><td></td><td></td><td></td><td></td><td></td></tr>
                <tr><td class="time-col">5</td><td></td><td></td><td></td><td></td><td></td></tr>
            </tbody>
        </table>
    </main>

</body>
</html>
