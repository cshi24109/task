<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学生活管理アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('timetable')">時間割・出欠</button>
        <button class="tab-btn" onclick="switchTab('calendar')">カレンダー・予定</button>
    </div>

    <div id="timetable-view">
        <div class="semester-select-zone">
            <div>
                <label style="font-size: 12px; font-weight: bold; color: #4b5563; margin-right: 6px;">表示中の時間割:</label>
                <select id="semester-select" class="semester-select" onchange="handleSemesterChange(this.value)">
                    </select>
                <span id="total-credits-view" style="margin-left: 15px; font-size: 13px; font-weight: bold; color: #1e3a8a; background: #dbeafe; padding: 6px 12px; border-radius: 20px; display: inline-block; vertical-align: middle;">
                    🔥 登録単位数: 0 単位
                </span>
            </div>
            <button class="btn-secondary" onclick="openAddSemesterModal()">＋ 新しい学期を追加</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">限</th>
                    <th>月</th>
                    <th>火</th>
                    <th>水</th>
                    <th>木</th>
                    <th>金</th>
                </tr>
            </thead>
            <tbody>
                <tr data-period="1"><th>1</th><td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td></tr>
                <tr data-period="2"><th>2</th><td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td></tr>
                <tr data-period="3"><th>3</th><td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td></tr>
                <tr data-period="4"><th>4</th><td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td></tr>
                <tr data-period="5"><th>5</th><td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td></tr>
            </tbody>
        </table>
    </div>

    <div id="calendar-view" style="display: none;">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)" style="cursor:pointer; padding:4px 10px;">◀ 前の月</button>
            <h3 id="calendar-month-year" style="margin:0;">2026年 7月</h3>
            <button onclick="changeMonth(1)" style="cursor:pointer; padding:4px 10px;">次の月 ▶</button>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
    </div>
</div>

<div id="modal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal('modal')">&times;</button>
        <h3 id="modal-title" style="margin-top:0;">授業設定</h3>
        <form id="course-form">
            <div class="form-group">
                <label>授業名</label>
                <input type="text" id="course-name-input" required placeholder="例: 経済学基礎">
            </div>
            <div class="form-group">
                <label>単位数</label>
                <input type="number" id="course-credits-input" min="0" max="10" value="2" required style="width: 100%; padding: 6px; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box;">
            </div>
            <div class="form-group">
                <label>科目区分</label>
                <div class="slider-container">
                    <input type="range" id="category-slider" min="0" max="2" value="0" style="flex:1;">
                    <span id="category-val" class="badge required">必修</span>
                </div>
            </div>
            <div class="form-group">
                <label>教室（メモ）</label>
                <input type="text" id="course-memo-input" placeholder="例: 401教室 / オンデマンド">
            </div>
            <button type="submit" class="btn-submit">保存する</button>
        </form>
        <button id="btn-delete" class="btn-delete">この授業を削除</button>
    </div>
</div>

<div id="task-modal" class="modal-overlay">
    <div class="modal-content" style="max-width: 450px;">
        <button class="close-btn" onclick="closeModal('task-modal')">&times;</button>
        <h3 id="task-modal-title" style="margin-top:0;">日付の予定</h3>
        
        <div id="existing-tasks" style="max-height: 180px; overflow-y: auto; margin-bottom: 15px;"></div>
        
        <div class="task-section">
            <h4 style="margin: 0 0 8px 0; font-size: 13px; color: #4b5563;">➕ 予定を追加する</h4>
            
            <div style="margin-bottom: 10px; padding: 6px; background: #f9fafb; border-radius: 6px;">
                <div class="task-input-row">
                    <input type="text" id="task-input-task" placeholder="📝 課題のタイトルを入力...">
                    <button onclick="handleAddTask('task')">追加</button>
                </div>
                <input type="text" id="task-memo-task" placeholder="┗ 課題のメモ（提出方法・範囲など）" style="width:100%; font-size:11px; padding:3px; margin-top:2px; box-sizing:border-box;">
            </div>
            
            <div style="margin-bottom: 10px; padding: 6px; background: #f9fafb; border-radius: 6px;">
                <div class="task-input-row">
                    <input type="text" id="task-input-test" placeholder="⚠️ テストのタイトルを入力...">
                    <button onclick="handleAddTask('test')">追加</button>
                </div>
                <input type="text" id="task-memo-test" placeholder="┗ テストのメモ（持ち物・範囲など）" style="width:100%; font-size:11px; padding:3px; margin-top:2px; box-sizing:border-box;">
            </div>
            
            <div style="padding: 6px; background: #f9fafb; border-radius: 6px;">
                <div class="task-input-row">
                    <input type="text" id="task-input-other" placeholder="📌 その他のタイトルを入力...">
                    <button onclick="handleAddTask('other')">追加</button>
                </div>
                <input type="text" id="task-memo-other" placeholder="┗ その他のメモ" style="width:100%; font-size:11px; padding:3px; margin-top:2px; box-sizing:border-box;">
            </div>
        </div>
    </div>
</div>

<div id="semester-modal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal('semester-modal')">&times;</button>
        <h3 style="margin-top:0;">新しい時間割（学期）を作成</h3>
        <div class="form-group">
            <label>学期名・タイトル</label>
            <input type="text" id="new-semester-input" placeholder="例: 2026年度 後期 / 2025年度 前期">
        </div>
        <button class="btn-submit" onclick="handleAddSemester()">作成する</button>
    </div>
</div>

<script>
// 初期データに credits（単位数）を追加
let timetableData = {
    '2026年度 前期': {
        '月-1': { name: '英語A', category: '必修', absence: 1, lateness: 0, memo: 'LL教室', credits: 2 }
    }
};
let currentSemester = '2026年度 前期';

let tasksData = {
    '2026-7-15': [
        { text: '経済レポート', type: 'task', memo: 'A4用紙3枚、ポータルからPDF提出' },
        { text: '数学中間テスト', type: 'test', memo: '範囲：教科書p.10〜p.50（電卓持込可）' },
        { text: 'サークル部費回収', type: 'other', memo: '一人500円、会計の山田くんに渡す' }
    ]
};

const categories = ['必修', '専門', '教養'];
const categoryClasses = { '必修': 'required', '専門': 'major', '教養': 'general' };
let activeTargetKey = null;
let activeTaskDate = null;

// --- タブ切り替え ---
window.switchTab = function(tabId) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    if (typeof window !== 'undefined' && window.event && window.event.target) {
        window.event.target.classList.add('active');
    } else {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            if((tabId === 'timetable' && btn.innerText.includes('時間割')) || (tabId === 'calendar' && btn.innerText.includes('カレンダー'))) {
                btn.classList.add('active');
            }
        });
    }
    document.getElementById('timetable-view').style.display = tabId === 'timetable' ? 'block' : 'none';
    document.getElementById('calendar-view').style.display = tabId === 'calendar' ? 'block' : 'none';
    if (tabId === 'calendar') renderCalendar();
};

// --- 学期（セメスター）追加・変更処理 ---
function updateSemesterSelect() {
    const select = document.getElementById('semester-select');
    if (!select) return;
    let html = '';
    for (let sem in timetableData) {
        html += `<option value="${sem}" ${sem === currentSemester ? 'selected' : ''}>${sem}</option>`;
    }
    select.innerHTML = html;
}

window.handleSemesterChange = function(value) {
    currentSemester = value;
    renderTimetable();
};

window.openAddSemesterModal = function() {
    document.getElementById('new-semester-input').value = '';
    document.getElementById('semester-modal').style.display = 'flex';
};

window.handleAddSemester = function() {
    const input = document.getElementById('new-semester-input');
    const name = input.value.trim();
    if (!name) return;
    
    if (timetableData[name]) {
        alert('その学期名は既に作成されています。');
        return;
    }
    
    timetableData[name] = {};
    currentSemester = name;
    
    closeModal('semester-modal');
    updateSemesterSelect();
    renderTimetable();
};

// --- カレンダー処理 ---
let currentCalendarDate = new Date();
window.changeMonth = function(offset) {
    currentCalendarDate.setMonth(currentCalendarDate.getMonth() + offset);
    renderCalendar();
};

function renderCalendar() {
    const year = currentCalendarDate.getFullYear();
    const month = currentCalendarDate.getMonth();
    document.getElementById('calendar-month-year').innerText = year + '年 ' + (month + 1) + '月';
    const firstDayIndex = new Date(year, month, 1).getDay();
    const lastDay = new Date(year, month + 1, 0).
