<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学生活管理アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="tabs">
        <button id="tab-timetable" class="tab-btn active" onclick="switchTab('timetable')">時間割・出欠</button>
        <button id="tab-calendar" class="tab-btn" onclick="switchTab('calendar')">カレンダー・予定</button>
    </div>

    <div id="timetable-view">
        <div class="semester-select-zone" style="display: flex; flex-direction: column; gap: 12px; align-items: flex-start; background: #f9fafb; padding: 15px; border-radius: 10px; border: 1px solid #e5e7eb;">
            <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                <div>
                    <label style="font-size: 13px; font-weight: bold; color: #4b5563; margin-right: 6px;">表示中の時間割:</label>
                    <select id="semester-select" class="semester-select" onchange="handleSemesterChange(this.value)">
                        </select>
                </div>
                <button class="btn-secondary" onclick="openAddSemesterModal()">＋ 新しい学期を追加</button>
            </div>

            <div id="total-credits-view" style="width: 100%; font-size: 12px; background: #ffffff; padding: 12px; border-radius: 8px; border: 1px solid #e5e7eb; box-sizing: border-box;">
                <div style="font-weight: bold; color: #1f2937; margin-bottom: 8px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px;">
                    <span>📊 今学期の登録単位:</span>
                    <span id="credits-current-total" style="color: #1e3a8a; font-size: 16px; font-weight: 900;">0</span> 単位 
                    <span style="color: #9ca3af; margin: 0 4px;">|</span>
                    <span class="badge required" style="margin:0;">必修</span> <span id="credits-req" style="font-weight:bold; margin-right:8px;">0</span>
                    <span class="badge major" style="margin:0;">専門</span> <span id="credits-maj" style="font-weight:bold; margin-right:8px;">0</span>
                    <span class="badge general" style="margin:0;">教養</span> <span id="credits-gen" style="font-weight:bold;">0</span>
                </div>
                <div style="font-weight: bold; color: #059669; font-size: 14px; border-top: 1px dashed #e5e7eb; padding-top: 6px; margin-top: 6px; display: flex; align-items: center; gap: 6px;">
                    🎓 歴代の総取得（登録）単位数: <span id="credits-lifetime" style="font-size: 18px; font-weight: 900; color: #059669;">0</span> 単位
                </div>
            </div>
        </div>

        <table style="margin-top: 15px;">
            <thead>
                <tr>
                    <th style="width: 50px;">限</th>
                    <th>月</th>
                    <th>火</th>
                    <th>水</th>
                    <th>木</th>
                    <th>金</th>
                </tr>
            </thead>
            <tbody>
                <tr data-period="1"><th>1</th><td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td></tr>
                <tr data-period="2"><th>2</th><td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td></tr>
                <tr data-period="3"><th>3</th><td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td></tr>
                <tr data-period="4"><th>4</th><td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td></tr>
                <tr data-period="5"><th>5</th><td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td></tr>
            </tbody>
        </table>
    </div>

    <div id="calendar-view" style="display: none;">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)" style="cursor:pointer; padding:4px 10px;">◀ 前の月</button>
            <h3 id="calendar-month-year" style="margin:0;">2026年 7月</h3>
            <button onclick="changeMonth(1)" style="cursor:pointer; padding:4px 10px;">次の月 ▶</button>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
    </div>
</div>

<div id="modal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal('modal')">&times;</button>
        <h3 id="modal-title" style="margin-top:0;">授業設定</h3>
        <form id="course-form">
            <div class="form-group">
                <label>授業名</label>
                <input type="text" id="course-name-input" required placeholder="例: 経済学基礎">
            </div>
            <div class="form-group">
                <label>単位数</label>
                <input type="number" id="course-credits-input" min="0" max="10" value="2" required style="width: 100%; padding: 6px; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box;">
            </div>
            <div class="form-group">
                <label>科目区分</label>
                <div class="slider-container">
                    <input type="range" id="category-slider" min="0" max="2" value="0" style="flex:1;">
                    <span id="category-val" class="badge required">必修</span>
                </div>
            </div>
            <div class="form-group">
                <label>教室（メモ）</label>
                <input type="text" id="course-memo-input" placeholder="例: 401教室 / オンデマンド">
            </div>
            <button type="submit" class="btn-submit">保存する</button>
        </form>
        <button id="btn-delete" class="btn-delete">この授業を削除</button>
    </div>
</div>

<div id="task-modal" class="modal-overlay">
    <div class="modal-content" style="max-width: 450px;">
        <button class="close-btn" onclick="closeModal('task-modal')">&times;</button>
        <h3 id="task-modal-title" style="margin-top:0;">日付の予定</h3>
        <div id="existing-tasks" style="max-height: 180px; overflow-y: auto; margin-bottom: 15px;"></div>
        <div class="task-section">
            <h4 style="margin: 0 0 8px 0; font-size: 13px; color: #4b5563;">➕ 予定を追加する</h4>
            <div style="margin-bottom: 10px; padding: 6px; background: #f9fafb; border-radius: 6px;">
                <div class="task-input-row">
                    <input type="text" id="task-input-task" placeholder="📝 課題のタイトルを入力...">
                    <button onclick="handleAddTask('task')">追加</button>
                </div>
                <input type="text" id="task-memo-task" placeholder="┗ 課題のメモ（提出方法・範囲など）" style="width:100%; font-size:11px; padding:3px; margin-top:2px; box-sizing:border-box;">
            </div>
            <div style="margin-bottom: 10px; padding: 6px; background: #f9fafb; border-radius: 6px;">
                <div class="task-input-row">
                    <input type="text" id="task-input-test" placeholder="⚠️ テストのタイトルを入力...">
                    <button onclick="handleAddTask('test')">追加</button>
                </div>
                <input type="text" id="task-memo-test" placeholder="┗ テストのメモ（持ち物・範囲など）" style="width:100%; font-size:11px; padding:3px; margin-top:2px; box-sizing:border-box;">
            </div>
            <div style="padding: 6px; background: #f9fafb; border-radius: 6px;">
                <div class="task-input-row">
                    <input type="text" id="task-input-other" placeholder="📌 その他のタイトルを入力...">
                    <button onclick="handleAddTask('other')">追加</button>
                </div>
                <input type="text" id="task-memo-other" placeholder="┗ その他のメモ" style="width:100%; font-size:11px; padding:3px; margin-top:2px; box-sizing:border-box;">
            </div>
        </div>
    </div>
</div>

<div id="semester-modal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal('semester-modal')">&times;</button>
        <h3 style="margin-top:0;">新しい時間割（学期）を作成</h3>
        <div class="form-group">
            <label>学期名・タイトル</label>
            <input type="text" id="new-semester-input" placeholder="例: 2026年度 後期 / 2025年度 前期">
        </div>
        <button class="btn-submit" onclick="handleAddSemester()">作成する</button>
    </div>
</div>

<script>
// 🆕 歴代カウントが確認しやすいよう、過去の学期データも最初から入れてあります
let timetableData = {
    '2026年度 前期': {
        '月-1': { name: '英語A', category: '必修', absence: 1, lateness: 0, memo: 'LL教室', credits: 2 },
        '火-3': { name: 'プログラミングI', category: '専門', absence: 0, lateness: 0, memo: 'PC第1教室', credits: 4 }
    },
    '2025年度 後期': {
        '水-2': { name: '経済学概論', category: '教養', absence: 0, lateness: 0, memo: '101教室', credits: 2 },
        '木-4': { name: 'データ構造', category: '専門', absence: 0, lateness: 0, memo: '302教室', credits: 4 }
    }
};
let currentSemester = '2026年度 前期';

let tasksData = {
    '2026-7-15': [
        { text: '経済レポート', type: 'task', memo: 'A4用紙3枚、ポータルからPDF提出' }
    ]
};

const categories = ['必修', '専門', '教養'];
const categoryClasses = { '必修': 'required', '専門': 'major', '教養': 'general' };
let activeTargetKey = null;
let activeTaskDate = null;

// --- タブ切り替え ---
window.switchTab = function(tabId) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    if (tabId === 'timetable') {
        document.getElementById('tab-timetable').classList.add('active');
    } else if (tabId === 'calendar') {
        document.getElementById('tab-calendar').classList.add('active');
    }
    document.getElementById('timetable-view').style.display = tabId === 'timetable' ? 'block' : 'none';
    document.getElementById('calendar-view').style.display = tabId === 'calendar' ? 'block' : 'none';
    if (tabId === 'calendar') renderCalendar();
};

// --- 学期追加・変更処理 ---
function updateSemesterSelect() {
    const select = document.getElementById('semester-select');
    if (!select) return;
    let html = '';
    for (let sem in timetableData) {
        html += `<option value="${sem}" ${sem === currentSemester ? 'selected' : ''}>${sem}</option>`;
    }
    select.innerHTML = html;
}

window.handleSemesterChange = function(value) {
    currentSemester = value;
    renderTimetable();
};

window.openAddSemesterModal = function() {
    document.getElementById('new-semester-input').value = '';
    document.getElementById('semester-modal').style.display = 'flex';
};

window.handleAddSemester = function() {
    const input = document.getElementById('new-semester-input');
    const name = input.value.trim();
    if (!name) return;
    if (timetableData[name]) {
        alert('その学期名は既に作成されています。');
        return;
    }
    timetableData[name] = {};
    currentSemester = name;
    closeModal('semester-modal');
    updateSemesterSelect();
    renderTimetable();
};

// --- カレンダー処理 ---
let currentCalendarDate = new Date();
window.changeMonth = function(offset) {
    currentCalendarDate.setMonth(currentCalendarDate.getMonth() + offset);
    renderCalendar();
};

function renderCalendar() {
    const year = currentCalendarDate.getFullYear();
    const month = currentCalendarDate.getMonth();
    document.getElementById('calendar-month-year').innerText = year + '年 ' + (month + 1) + '月';
    const firstDayIndex = new Date(year, month, 1).getDay();
    const lastDay = new Date(year, month + 1, 0).getDate();
    const grid = document.getElementById('calendar-grid');
    if (!grid) return;
    let html = '';
    
    ['日', '月', '火', '水', '木', '金', '土'].forEach(d => html += '<div class="calendar-cell header">' + d + '</div>');
    for (let x = 0; x < firstDayIndex; x++) html += '<div class="calendar-cell other-month"></div>';
    
    const today = new Date();
    for (let i = 1; i <= lastDay; i++) {
        const dateKey = year + '-' + (month + 1) + '-' + i;
        const isToday = i === today.getDate() && month === today.getMonth() && year === today.getFullYear();
        const tasks = tasksData[dateKey] || [];
        
        let taskHtml = '<div class="task-list">';
        tasks.forEach(t => {
            let prefix = t.type === 'test' ? '⚠️ ' : (t.type === 'task' ? '📝 ' : '📌 ');
            taskHtml += '<div class="task-badge ' + t.type + '">' + prefix + t.text + '</div>';
        });
        taskHtml += '</div>';

        html += `
            <div class="calendar-cell" onclick="openTaskModal(${year}, ${month+1}, ${i})">
                <div class="date-num ${isToday ? 'today' : ''}">${i}</div>
                ${taskHtml}
                <div class="add-task-hint">＋ 編集</div>
            </div>`;
    }
    grid.innerHTML = html;
}

window.openTaskModal = function(y, m, d) {
    activeTaskDate = y + '-' + m + '-' + d;
    document.getElementById('task-modal-title').innerText = m + '月' + d + '日の予定';
    renderTaskList();
    document.getElementById('task-modal').style.display = 'flex';
};

function renderTaskList() {
    const tasks = tasksData[activeTaskDate] || [];
    const container = document.getElementById('existing-tasks');
    if (!container) return;
    if (tasks.length === 0) {
        container.innerHTML = '<p style="font-size: 12px; color: #9ca3af; text-align: center;">予定はありません</p>';
    } else {
        let html = '';
        const typeLabels = { 'task': '課題', 'test': 'テスト', 'other': 'その他' };
        const classMap = { 'task': 'major', 'test': 'required', 'other': 'general' };
        
        tasks.forEach((task, index) => {
            let memoDiv = '';
            if (task.memo) {
                memoDiv = '<div style="font-size: 11px; color: #6b7280; margin-top: 2px; padding-left: 6px; border-left: 2px solid #d1d5db; word-break: break-all;">' + task.memo + '</div>';
            }
            html += `
                <div class="task-entry" style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed #eee;">
                    <div style="flex: 1; text-align: left;">
                        <span class="badge ${classMap[task.type]}" style="margin-left:0; margin-right:4px;">${typeLabels[task.type]}</span>
                        <span style="font-weight: bold;">${task.text}</span>
                        ${memoDiv}
                    </div>
                    <button class="btn-done" onclick="deleteTask(${index})" style="margin-left: 8px;">完了</button>
                </div>`;
        });
        container.innerHTML = html;
    }
}

window.handleAddTask = function(type) {
    const input = document.getElementById('task-input-' + type);
    const memoInput = document.getElementById('task-memo-' + type);
    if (!input) return;
    const value = input.value.trim();
    const memoValue = memoInput ? memoInput.value.trim() : '';
    if (!value) return;

    if (!tasksData[activeTaskDate]) tasksData[activeTaskDate] = [];
    tasksData[activeTaskDate].push({ text: value, type: type, memo: memoValue });
    
    input.value = '';
    if (memoInput) memoInput.value = '';
    renderTaskList();
    renderCalendar();
};

window.deleteTask = function(index) {
    if (!tasksData[activeTaskDate]) return;
    tasksData[activeTaskDate].splice(index, 1);
    if (tasksData[activeTaskDate].length === 0) delete tasksData[activeTaskDate];
    renderTaskList();
    renderCalendar();
};

// --- 時間割・集計処理 ---
window.closeModal = function(id) { document.getElementById(id).style.display = 'none'; };

function updateSliderLabel(value) {
    const cat = categories[value];
    const labelSpan = document.getElementById('category-val');
    if (labelSpan) {
        labelSpan.innerText = cat;
        labelSpan.className = 'badge ' + categoryClasses[cat];
    }
}

function renderTimetable() {
    updateSemesterSelect();
    
    // 🆕 単位数の集計ロジック（今学期の内訳 ＆ 歴代の総計）
    let currentCredits = { '必修': 0, '専門': 0, '教養': 0, '合計': 0 };
    let lifetimeCredits = 0;
    
    // ① 表示中（今学期）の集計
    const semesterData = timetableData[currentSemester] || {};
    for (let key in semesterData) {
        if (semesterData[key] && semesterData[key].credits) {
            const credits = Number(semesterData[key].credits);
            const cat = semesterData[key].category || '教養';
            if (currentCredits[cat] !== undefined) {
                currentCredits[cat] += credits;
            }
            currentCredits['合計'] += credits;
        }
    }
    
    // ② 歴代（全学期）の総集計
    for (let sem in timetableData) {
        for (let key in timetableData[sem]) {
            if (timetableData[sem][key] && timetableData[sem][key].credits) {
                lifetimeCredits += Number(timetableData[sem][key].credits);
            }
        }
    }
    
    // 🆕 画面上の集計バッジ（テキスト）を書き換える
    if(document.getElementById('credits-req')) document.getElementById('credits-req').innerText = currentCredits['必修'];
    if(document.getElementById('credits-maj')) document.getElementById('credits-maj').innerText = currentCredits['専門'];
    if(document.getElementById('credits-gen')) document.getElementById('credits-gen').innerText = currentCredits['教養'];
    if(document.getElementById('credits-current-total')) document.getElementById('credits-current-total').innerText = currentCredits['合計'];
    if(document.getElementById('credits-lifetime')) document.getElementById('credits-lifetime').innerText = lifetimeCredits;
    
    // テーブルの再描画
    document.querySelectorAll('td[data-day]').forEach(td => {
        const day = td.getAttribute('data-day');
        const period = td.parentElement.getAttribute('data-period');
        const key = day + '-' + period;
        const course = semesterData[key];
        
        if (course) {
            const totalAbs = course.absence + (course.lateness / 3);
            const rem = 5 - totalAbs;
            const remText = Number(rem.toFixed(2));
            const alertMsg = rem < 0 ? "落単 乙w" : rem === 0 ? "絶対に学校に行け！！" : "あと " + remText + " 回欠席できます";
            const isDanger = rem <= 1;
            
            let memoHtml = '';
            if (course.memo) {
                memoHtml = '<div class="course-room" style="font-size: 10px; color: #4b5563; background: rgba(255,255,255,0.6); padding: 1px 4px; border-radius: 3px; display: inline-block; margin-top: 4px; font-weight: 500; word-break: break-all;">🚪 ' + course.memo + '</div>';
            }

            td.innerHTML = `
                <div class="course-card ${categoryClasses[course.category]}">
                    <div onclick="openModal('${day}', ${period})">
                        <span class="category-badge">${course.category}</span>
                        <span style="font-size: 10px; font-weight: bold; color: #4b5563; float: right;">${course.credits || 0}単位</span>
                        <div class="course-name">${course.name}</div>
                        ${memoHtml}
                    </div>
                    <div class="absence-zone" style="display: flex; flex-direction: column; align-items: stretch; gap: 4px;">
                        <div style="display: flex; justify-content: space-between;"><span>欠席: <b>${course.absence}</b>回</span>
                            <div class="btn-zone"><button onclick="changeCount('${key}','absence',-1)">-</button><button onclick="changeCount('${key}','absence',1)">+</button></div></div>
                        <div style="display: flex; justify-content: space-between;"><span>遅刻: <b>${course.lateness}</b>回</span>
                            <div class="btn-zone"><button onclick="changeCount('${key}','lateness',-1)">-</button><button onclick="changeCount('${key}','lateness',1)">+</button></div></div>
                        <div style="font-size: 9px; font-weight: bold; color: ${isDanger?'#dc2626':'inherit'}; text-align: center; padding-top: 2px;">${alertMsg}</div>
                    </div>
                </div>`;
        } else {
            td.innerHTML = '<button class="btn-add" onclick="openModal(\'' + day + '\', ' + period + ')">+ 追加</button>';
        }
    });
}

window.changeCount = function(key, type, amt) {
    if (timetableData[currentSemester] && timetableData[currentSemester][key]) { 
        timetableData[currentSemester][key][type] = Math.max(0, (timetableData[currentSemester][key][type] || 0) + amt); 
        renderTimetable(); 
    }
};

window.openModal = function(day, period) {
    activeTargetKey = day + '-' + period;
    document.getElementById('modal-title').innerText = day + '曜日 ' + period + '限の授業設定';
    
    const existing = timetableData[currentSemester] ? timetableData[currentSemester][activeTargetKey] : null;
    const deleteBtn = document.getElementById('btn-delete');
    
    if (existing) {
        document.getElementById('course-name-input').value = existing.name;
        document.getElementById('course-credits-input').value = existing.credits || 2;
        document.getElementById('course-memo-input').value = existing.memo || '';
        const catIndex = categories.indexOf(existing.category);
        document.getElementById('category-slider').value = catIndex;
        updateSliderLabel(catIndex);
        deleteBtn.style.display = 'block';
    } else {
        document.getElementById('course-name-input').value = '';
        document.getElementById('course-credits-input').value = 2;
        document.getElementById('course-memo-input').value = '';
        document.getElementById('category-slider').value = 0;
        updateSliderLabel(0);
        deleteBtn.style.display = 'none';
    }
    document.getElementById('modal').style.display = 'flex';
};

document.getElementById('course-form').onsubmit = function(e) {
    e.preventDefault();
    if (!timetableData[currentSemester]) timetableData[currentSemester] = {};
    
    const existing = timetableData[currentSemester][activeTargetKey];
    timetableData[currentSemester][activeTargetKey] = {
        name: document.getElementById('course-name-input').value,
        credits: Number(document.getElementById('course-credits-input').value),
        category: categories[document.getElementById('category-slider').value],
        absence: existing ? existing.absence : 0,
        lateness: existing ? existing.lateness : 0,
        memo: document.getElementById('course-memo-input').value
    };
    closeModal('modal');
    renderTimetable();
};

document.getElementById('btn-delete').onclick = function() { 
    if (timetableData[currentSemester]) {
        delete timetableData[currentSemester][activeTargetKey]; 
    }
    closeModal('modal'); 
    renderTimetable(); 
};

window.onload = function() {
    const slider = document.getElementById('category-slider');
    if (slider) {
        slider.addEventListener('input', (e) => {
            updateSliderLabel(e.target.value);
        });
    }
    renderTimetable();
};
</script>
</body>
</html>
