<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出席管理アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>出席管理アプリ</h1>
        <select style="border: 1px solid #d1d5db; border-radius: 4px; padding: 4px 8px;">
            <option>2026年度 前期</option>
            <option>2026年度 後期</option>
        </select>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('timetable')">時間割</button>
        <button class="tab-btn" onclick="switchTab('calendar')">カレンダー・課題</button>
    </div>

    <main id="timetable-view">
        <table>
            <thead>
                <tr>
                    <th style="width: 60px;">時限</th>
                    <th>月曜日</th><th>火曜日</th><th>水曜日</th><th>木曜日</th><th>金曜日</th>
                </tr>
            </thead>
            <tbody>
                <tr data-period="1">
                    <td class="time-col">1</td>
                    <td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td>
                </tr>
                <tr data-period="2">
                    <td class="time-col">2</td>
                    <td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td>
                </tr>
                <tr data-period="3">
                    <td class="time-col">3</td>
                    <td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td>
                </tr>
                <tr data-period="4">
                    <td class="time-col">4</td>
                    <td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td>
                </tr>
                <tr data-period="5">
                    <td class="time-col">5</td>
                    <td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td>
                </tr>
            </tbody>
        </table>
    </main>

    <main id="calendar-view" style="display: none;">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)">◀ 先月</button>
            <h2 id="calendar-month-year">2026年 7月</h2>
            <button onclick="changeMonth(1)">来月 ▶</button>
        </div>
        <div class="calendar-grid" id="calendar-grid">
            </div>
    </main>

    <div id="modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="modal-title">授業を設定</h3>
            <form id="course-form">
                <div class="form-group">
                    <label>科目名</label>
                    <input type="text" id="course-name-input" placeholder="例: 経済学基礎" required>
                </div>
                <div class="form-group">
                    <label>科目区分: <span id="category-val" class="badge required">必修</span></label>
                    <input type="range" id="category-slider" min="0" max="2" value="0" step="1">
                    <div class="slider-labels">
                        <span>必修</span><span>専門</span><span>教養</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>メモ (教室・評価基準など)</label>
                    <textarea id="course-memo-input" placeholder="例: 301教室、レポート40% 試験60%" rows="3" style="resize: vertical; font-family: inherit; font-size: 13px;"></textarea>
                </div>
                <div class="btn-group-container">
                    <button type="button" id="btn-delete" class="btn-danger" style="display: none;">削除</button>
                    <div class="btn-sub-group">
                        <button type="button" id="btn-cancel">閉じる</button>
                        <button type="submit" id="btn-save">保存</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // タブ切り替えの処理
        // ==========================================
        window.switchTab = function(tabId) {
            // タブの見た目を切り替え
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // 画面の表示/非表示を切り替え
            if (tabId === 'timetable') {
                document.getElementById('timetable-view').style.display = 'block';
                document.getElementById('calendar-view').style.display = 'none';
            } else {
                document.getElementById('timetable-view').style.display = 'none';
                document.getElementById('calendar-view').style.display = 'block';
                renderCalendar(); // カレンダーを描画
            }
        };

        // ==========================================
        // カレンダーの処理
        // ==========================================
        let currentCalendarDate = new Date(); // 今日の日付を取得

        window.changeMonth = function(offset) {
            // ◀ ▶ ボタンを押した時に月を移動
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() + offset);
            renderCalendar();
        };

        function renderCalendar() {
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();
            
            document.getElementById('calendar-month-year').innerText = `${year}年 ${month + 1}月`;
            
            // その月の最初の日の曜日 (0:日, 1:月...)
            const firstDayIndex = new Date(year, month, 1).getDay();
            // その月の日数
            const lastDay = new Date(year, month + 1, 0).getDate();
            // 先月の日数
            const prevLastDay = new Date(year, month, 0).getDate();
            
            const grid = document.getElementById('calendar-grid');
            let html = '';
            
            // 曜日ヘッダー
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            days.forEach(d => { html += `<div class="calendar-cell header">${d}</div>`; });
            
            // 先月のはみ出した日数
            for (let x = firstDayIndex; x > 0; x--) {
                html += `<div class="calendar-cell other-month"><div class="date-num">${prevLastDay - x + 1}</div></div>`;
            }
            
            // 今月の日数
            const today = new Date();
            for (let i = 1; i <= lastDay; i++) {
                // 今日かどうかを判定してデザインを変える
                const isToday = i === today.getDate() && month === today.getMonth() && year === today.getFullYear();
                const todayClass = isToday ? 'today' : '';
                
                // 将来的に課題を追加できるように onclick を仕込んでおく
                html += `
                    <div class="calendar-cell" onclick="alert('ここに課題追加機能を作ります！: ${year}/${month+1}/${i}')">
                        <div class="date-num ${todayClass}">${i}</div>
                        <div class="add-task-hint">＋ 課題追加</div>
                    </div>`;
            }
            
            // 来月のはみ出した日数 (マス目を42マス[6行]に固定)
            const totalCells = firstDayIndex + lastDay;
            const nextDays = 42 - totalCells;
            for (let j = 1; j <= nextDays; j++) {
                html += `<div class="calendar-cell other-month"><div class="date-num">${j}</div></div>`;
            }
            
            grid.innerHTML = html;
        }

        // ==========================================
        // 時間割の処理 (先ほどまでのコードそのまま)
        // ==========================================
        let timetableData = {
            '月-1': { name: '英語A', category: '必修', absence: 1, lateness: 0, memo: 'LL教室\n単語テスト毎週あり' },
            '水-3': { name: 'データ構造論', category: '専門', absence: 2, lateness: 1, memo: '5号館2階PC室' },
            '金-2': { name: '心理学基礎', category: '教養', absence: 0, lateness: 2, memo: '大講義室\n出席重視' }
        };

        const categories = ['必修', '専門', '教養'];
        const categoryClasses = { '必修': 'required', '専門': 'major', '教養': 'general' };
        let activeTargetKey = null;

        function renderTimetable() {
            document.querySelectorAll('td[data-day]').forEach(td => {
                const day = td.getAttribute('data-day');
                const period = td.parentElement.getAttribute('data-period');
                const key = `${day}-${period}`;
                const course = timetableData[key];

                if (course) {
                    if (course.lateness === undefined) course.lateness = 0;

                    const totalAbsenceValue = course.absence + (course.lateness / 3);
                    const remaining = Math.max(0, 5 - totalAbsenceValue);
                    const remainingText = Number(remaining.toFixed(2));
                    const hasMemoMarker = course.memo && course.memo.trim() ? '<span style="float: right; font-size: 10px; opacity: 0.6;">📝</span>' : '';

                    td.innerHTML = `
                        <div class="course-card ${categoryClasses[course.category]}">
                            <div onclick="openModal('${day}', ${period})">
                                ${hasMemoMarker}
                                <span class="category-badge">${course.category}</span>
                                <div class="course-name">${course.name}</div>
                            </div>
                            <div class="absence-zone" style="flex-direction: column; align-items: stretch; gap: 4px;">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <span>欠席: <b>${course.absence}</b>回</span>
                                    <div class="btn-zone">
                                        <button onclick="changeCount('${key}', 'absence', -1)">-</button>
                                        <button onclick="changeCount('${key}', 'absence', 1)">+</button>
                                    </div>
                                </div>
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <span>遅刻: <b>${course.lateness}</b>回</span>
                                    <div class="btn-zone">
                                        <button onclick="changeCount('${key}', 'lateness', -1)">-</button>
                                        <button onclick="changeCount('${key}', 'lateness', 1)">+</button>
                                    </div>
                                </div>
                                <div style="font-size: 10px; font-weight: bold; margin-top: 2px; color: ${remaining <= 1 ? '#dc2626' : 'inherit'}; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 3px; text-align: center;">
                                    あと "${remainingText}" 回欠席できます
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    td.innerHTML = `<button class="btn-add" onclick="openModal('${day}', ${period})">+ 追加</button>`;
                }
            });
        }

        window.changeCount = function(key, type, amount) {
            if (timetableData[key]) {
                timetableData[key][type] = Math.max(0, (timetableData[key][type] || 0) + amount);
                renderTimetable();
            }
        };

        window.openModal = function(day, period) {
            activeTargetKey = `${day}-${period}`;
            document.getElementById('modal-title').innerText = `${day}曜日 ${period}限の授業設定`;
            
            const existing = timetableData[activeTargetKey];
            const deleteBtn = document.getElementById('btn-delete');

            if (existing) {
                document.getElementById('course-name-input').value = existing.name;
                document.getElementById('course-memo-input').value = existing.memo || '';
                const catIndex = categories.indexOf(existing.category);
                document.getElementById('category-slider').value = catIndex;
                updateSliderLabel(catIndex);
                deleteBtn.style.display = 'block';
            } else {
                document.getElementById('course-name-input').value = '';
                document.getElementById('course-memo-input').value = '';
                document.getElementById('category-slider').value = 0;
                updateSliderLabel(0);
                deleteBtn.style.display = 'none';
            }
            
            document.getElementById('modal').style.display = 'flex';
        };

        const slider = document.getElementById('category-slider');
        const labelSpan = document.getElementById('category-val');

        function updateSliderLabel(value) {
            const cat = categories[value];
            labelSpan.innerText = cat;
            labelSpan.className = `badge ${categoryClasses[cat]}`;
        }

        slider.addEventListener('input', (e) => {
            updateSliderLabel(e.target.value);
        });

        document.getElementById('btn-cancel').addEventListener('click', () => {
            document.getElementById('modal').style.display = 'none';
        });

        document.getElementById('btn-delete').addEventListener('click', () => {
            if (activeTargetKey && timetableData[activeTargetKey]) {
                delete timetableData[activeTargetKey];
                document.getElementById('modal').style.display = 'none';
                renderTimetable();
            }
        });

        document.getElementById('course-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('course-name-input').value.trim();
            const memo = document.getElementById('course-memo-input').value;
            const catIndex = document.getElementById('category-slider').value;
            const category = categories[catIndex];

            if (!name) return;

            const currentAbsence = timetableData[activeTargetKey] ? timetableData[activeTargetKey].absence : 0;
            const currentLateness = timetableData[activeTargetKey] ? (timetableData[activeTargetKey].lateness || 0) : 0;

            timetableData[activeTargetKey] = {
                name: name,
                category: category,
                absence: currentAbsence,
                lateness: currentLateness,
                memo: memo
            };

            document.getElementById('modal').style.display = 'none';
            renderTimetable();
        });

        // 起動時に時間割を描画
        renderTimetable();
    </script>
</body>
</html>
