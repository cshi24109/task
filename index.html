<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出席管理アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>出席管理アプリ</h1>
        <select>
            <option>2026年度 前期</option>
            <option>2026年度 後期</option>
        </select>
    </header>

    <main>
        <table>
            <thead>
                <tr>
                    <th style="width: 60px;">時限</th>
                    <th>月曜日</th>
                    <th>火曜日</th>
                    <th>水曜日</th>
                    <th>木曜日</th>
                    <th>金曜日</th>
                </tr>
            </thead>
            <tbody>
                <tr data-period="1">
                    <td class="time-col">1</td>
                    <td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td>
                </tr>
                <tr data-period="2">
                    <td class="time-col">2</td>
                    <td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td>
                </tr>
                <tr data-period="3">
                    <td class="time-col">3</td>
                    <td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td>
                </tr>
                <tr data-period="4">
                    <td class="time-col">4</td>
                    <td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td>
                </tr>
                <tr data-period="5">
                    <td class="time-col">5</td>
                    <td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td>
                </tr>
            </tbody>
        </table>
    </main>

    <div id="modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="modal-title">授業を設定</h3>
            <form id="course-form">
                <div class="form-group">
                    <label>科目名</label>
                    <input type="text" id="course-name-input" placeholder="例: 経済学基礎" required>
                </div>
                
                <div class="form-group">
                    <label>科目区分: <span id="category-val" class="badge required">必修</span></label>
                    <input type="range" id="category-slider" min="0" max="2" value="0" step="1">
                    <div class="slider-labels">
                        <span>必修</span>
                        <span>専門</span>
                        <span>教養</span>
                    </div>
                </div>

                <div class="btn-group-container">
                    <button type="button" id="btn-delete" class="btn-danger" style="display: none;">削除</button>
                    <div class="btn-sub-group">
                        <button type="button" id="btn-cancel">閉じる</button>
                        <button type="submit" id="btn-save">保存</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ★scriptタグの中身をこのコードに丸ごと差し替えてください
let timetableData = {
    '月-1': { name: '英語A', category: '必修', absence: 1, lateness: 0 },
    '水-3': { name: 'データ構造論', category: '専門', absence: 2, lateness: 1 },
    '金-2': { name: '心理学基礎', category: '教養', absence: 0, lateness: 2 }
};

const categories = ['必修', '専門', '教養'];
const categoryClasses = { '必修': 'required', '専門': 'major', '教養': 'general' };

let activeTargetKey = null;

function renderTimetable() {
    document.querySelectorAll('td[data-day]').forEach(td => {
        const day = td.getAttribute('data-day');
        const period = td.parentElement.getAttribute('data-period');
        const key = `${day}-${period}`;
        const course = timetableData[key];

        if (course) {
            // 遅刻（lateness）がない古いデータのための対策
            if (course.lateness === undefined) course.lateness = 0;

            td.innerHTML = `
                <div class="course-card ${categoryClasses[course.category]}">
                    <div onclick="openModal('${day}', ${period})">
                        <span class="category-badge">${course.category}</span>
                        <div class="course-name">${course.name}</div>
                    </div>
                    <div class="absence-zone" style="flex-direction: column; align-items: stretch; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span>欠席: <b>${course.absence}</b>回</span>
                            <div class="btn-zone">
                                <button onclick="changeCount('${key}', 'absence', -1)">-</button>
                                <button onclick="changeCount('${key}', 'absence', 1)">+</button>
                            </div>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span>遅刻: <b>${course.lateness}</b>回</span>
                            <div class="btn-zone">
                                <button onclick="changeCount('${key}', 'lateness', -1)">-</button>
                                <button onclick="changeCount('${key}', 'lateness', 1)">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        } else {
            td.innerHTML = `<button class="btn-add" onclick="openModal('${day}', ${period})">+ 追加</button>`;
        }
    });
}

// 欠席・遅刻の両方のカウントを増減できるように修正した関数
window.changeCount = function(key, type, amount) {
    if (timetableData[key]) {
        timetableData[key][type] = Math.max(0, (timetableData[key][type] || 0) + amount);
        renderTimetable();
    }
};

window.openModal = function(day, period) {
    activeTargetKey = `${day}-${period}`;
    document.getElementById('modal-title').innerText = `${day}曜日 ${period}限の授業設定`;
    
    const existing = timetableData[activeTargetKey];
    const deleteBtn = document.getElementById('btn-delete');

    if (existing) {
        document.getElementById('course-name-input').value = existing.name;
        const catIndex = categories.indexOf(existing.category);
        document.getElementById('category-slider').value = catIndex;
        updateSliderLabel(catIndex);
        deleteBtn.style.display = 'block';
    } else {
        document.getElementById('course-name-input').value = '';
        document.getElementById('category-slider').value = 0;
        updateSliderLabel(0);
        deleteBtn.style.display = 'none';
    }
    
    document.getElementById('modal').style.display = 'flex';
};

const slider = document.getElementById('category-slider');
const labelSpan = document.getElementById('category-val');

function updateSliderLabel(value) {
    const cat = categories[value];
    labelSpan.innerText = cat;
    labelSpan.className = `badge ${categoryClasses[cat]}`;
}

slider.addEventListener('input', (e) => {
    updateSliderLabel(e.target.value);
});

document.getElementById('btn-cancel').addEventListener('click', () => {
    document.getElementById('modal').style.display = 'none';
});

document.getElementById('btn-delete').addEventListener('click', () => {
    if (activeTargetKey && timetableData[activeTargetKey]) {
        delete timetableData[activeTargetKey];
        document.getElementById('modal').style.display = 'none';
        renderTimetable();
    }
});

document.getElementById('course-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('course-name-input').value.trim();
    const catIndex = document.getElementById('category-slider').value;
    const category = categories[catIndex];

    if (!name) return;

    // 既存のデータを引き継ぎ、新規なら0で初期化
    const currentAbsence = timetableData[activeTargetKey] ? timetableData[activeTargetKey].absence : 0;
    const currentLateness = timetableData[activeTargetKey] ? (timetableData[activeTargetKey].lateness || 0) : 0;

    timetableData[activeTargetKey] = {
        name: name,
        category: category,
        absence: currentAbsence,
        lateness: currentLateness
    };

    document.getElementById('modal').style.display = 'none';
    renderTimetable();
});

renderTimetable();
    </script>
</body>
</html>
