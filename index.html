<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出席管理アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>出席管理アプリ</h1>
        <select style="border: 1px solid #d1d5db; border-radius: 4px; padding: 4px 8px;">
            <option>2026年度 前期</option>
            <option>2026年度 後期</option>
        </select>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('timetable')">時間割</button>
        <button class="tab-btn" onclick="switchTab('calendar')">カレンダー・課題</button>
    </div>

    <main id="timetable-view">
        <table>
            <thead>
                <tr>
                    <th style="width: 60px;">時限</th>
                    <th>月曜日</th><th>火曜日</th><th>水曜日</th><th>木曜日</th><th>金曜日</th>
                </tr>
            </thead>
            <tbody>
                <tr data-period="1"><td class="time-col">1</td><td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td></tr>
                <tr data-period="2"><td class="time-col">2</td><td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td></tr>
                <tr data-period="3"><td class="time-col">3</td><td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td></tr>
                <tr data-period="4"><td class="time-col">4</td><td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td></tr>
                <tr data-period="5"><td class="time-col">5</td><td data-day="月"></td><td data-day="火"></td><td data-day="水"></td><td data-day="木"></td><td data-day="金"></td></tr>
            </tbody>
        </table>
    </main>

    <main id="calendar-view" style="display: none;">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)">◀ 先月</button>
            <h2 id="calendar-month-year">2026年 7月</h2>
            <button onclick="changeMonth(1)">来月 ▶</button>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
    </main>

    <div id="modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="modal-title">授業を設定</h3>
            <form id="course-form">
                <div class="form-group">
                    <label>科目名</label>
                    <input type="text" id="course-name-input" placeholder="例: 経済学基礎" required>
                </div>
                <div class="form-group">
                    <label>科目区分: <span id="category-val" class="badge required">必修</span></label>
                    <input type="range" id="category-slider" min="0" max="2" value="0" step="1">
                    <div class="slider-labels"><span>必修</span><span>専門</span><span>教養</span></div>
                </div>
                <div class="form-group"><label>メモ</label><textarea id="course-memo-input" rows="3"></textarea></div>
                <div class="btn-group-container">
                    <button type="button" id="btn-delete" class="btn-danger" style="display: none;">削除</button>
                    <div class="btn-sub-group"><button type="button" onclick="closeModal('modal')">閉じる</button><button type="submit">保存</button></div>
                </div>
            </form>
        </div>
    </div>

    <div id="task-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="task-modal-title">予定を管理</h3>
            <div id="existing-tasks" style="margin-bottom: 15px; max-height: 160px; overflow-y: auto;"></div>
            
            <div style="border-top: 1px solid #eee; padding-top: 15px;">
                <div class="form-group">
                    <label style="color: #1e40af;">📝 課題を追加</label>
                    <div class="task-input-group">
                        <input type="text" id="task-input-task" placeholder="課題を入力...">
                        <input type="text" id="task-memo-task" placeholder="課題のメモ（提出方法、範囲など）" style="width:100%; margin-top:4px; font-size:12px; padding:4px;">
                        <button onclick="handleAddTask('task')">追加</button>

                        <input type="text" id="task-input-test" placeholder="テストを入力...">
                        <input type="text" id="task-memo-test" placeholder="テストのメモ（持ち物、範囲など）" style="width:100%; margin-top:4px; font-size:12px; padding:4px;">
                        <button onclick="handleAddTask('test')">追加</button>

                        <input type="text" id="task-input-other" placeholder="その他を入力...">
                        <input type="text" id="task-memo-other" placeholder="その他のメモ" style="width:100%; margin-top:4px; font-size:12px; padding:4px;">
                        <button onclick="handleAddTask('other')">追加</button>
                    </div>
                </div>
                <div class="form-group">
                    <label style="color: #991b1b;">⚠️ テストを追加</label>
                    <div class="task-input-group">
                        <input type="text" id="task-input-test" placeholder="例: 中間試験">
                        <button type="button" class="btn-add-test" onclick="handleAddTask('test')">追加</button>
                    </div>
                </div>
                <div class="form-group">
                    <label style="color: #4b5563;">📌 その他を追加</label>
                    <div class="task-input-group">
                        <input type="text" id="task-input-other" placeholder="例: ガイダンス、補講">
                        <button type="button" class="btn-add-other" onclick="handleAddTask('other')">追加</button>
                    </div>
                </div>
                
                <div class="btn-group-container" style="margin-top: 15px;">
                    <div class="btn-sub-group">
                        <button type="button" onclick="closeModal('task-modal')">閉じる</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ★index.htmlの最下部にあるscriptタグの中身を、このコードに丸ごと差し替えてください
let timetableData = {
    '月-1': { name: '英語A', category: '必修', absence: 1, lateness: 0, memo: 'LL教室' }
};
let tasksData = {
    '2026-7-15': [
        { text: '経済レポート', type: 'task', memo: 'A4用紙3枚、ポータルからPDF提出' },
        { text: '数学中間テスト', type: 'test', memo: '範囲：教科書p.10〜p.50（電卓持込可）' },
        { text: 'サークル部費回収', type: 'other', memo: '一人500円、会計の山田くんに渡す' }
    ]
};

const categories = ['必修', '専門', '教養'];
const categoryClasses = { '必修': 'required', '専門': 'major', '教養': 'general' };
let activeTargetKey = null;
let activeTaskDate = null;

// --- タブ切り替え ---
window.switchTab = function(tabId) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    if (typeof window !== 'undefined' && window.event && window.event.target) {
        window.event.target.classList.add('active');
    }
    document.getElementById('timetable-view').style.display = tabId === 'timetable' ? 'block' : 'none';
    document.getElementById('calendar-view').style.display = tabId === 'calendar' ? 'block' : 'none';
    if (tabId === 'calendar') renderCalendar();
};

// --- カレンダー処理 ---
let currentCalendarDate = new Date();
window.changeMonth = function(offset) {
    currentCalendarDate.setMonth(currentCalendarDate.getMonth() + offset);
    renderCalendar();
};

function renderCalendar() {
    const year = currentCalendarDate.getFullYear();
    const month = currentCalendarDate.getMonth();
    document.getElementById('calendar-month-year').innerText = `${year}年 ${month + 1}月`;
    const firstDayIndex = new Date(year, month, 1).getDay();
    const lastDay = new Date(year, month + 1, 0).getDate();
    const grid = document.getElementById('calendar-grid');
    let html = '';
    ['日', '月', '火', '水', '木', '金', '土'].forEach(d => html += `<div class="calendar-cell header">${d}</div>`);
    
    for (let x = 0; x < firstDayIndex; x++) html += `<div class="calendar-cell other-month"></div>`;
    
    const today = new Date();
    for (let i = 1; i <= lastDay; i++) {
        const dateKey = `${year}-${month+1}-${i}`;
        const isToday = i === today.getDate() && month === today.getMonth() && year === today.getFullYear();
        const tasks = tasksData[dateKey] || [];
        
        let taskHtml = '<div class="task-list">';
        tasks.forEach(t => {
            let prefix = t.type === 'test' ? '⚠️ ' : (t.type === 'task' ? '📝 ' : '📌 ');
            taskHtml += `<div class="task-badge ${t.type}">${prefix}${t.text}</div>`;
        });
        taskHtml += '</div>';

        html += `
            <div class="calendar-cell" onclick="openTaskModal(${year}, ${month+1}, ${i})">
                <div class="date-num ${isToday ? 'today' : ''}">${i}</div>
                ${taskHtml}
                <div class="add-task-hint">＋ 編集</div>
            </div>`;
    }
    grid.innerHTML = html;
}

window.openTaskModal = function(y, m, d) {
    activeTaskDate = `${y}-${m}-${d}`;
    document.getElementById('task-modal-title').innerText = `${m}月${d}日の予定`;
    renderTaskList();
    document.getElementById('task-modal').style.display = 'flex';
};

function renderTaskList() {
    const tasks = tasksData[activeTaskDate] || [];
    const container = document.getElementById('existing-tasks');
    if (tasks.length === 0) {
        container.innerHTML = '<p style="font-size: 12px; color: #9ca3af; text-align: center;">予定はありません</p>';
    } else {
        let html = '';
        const typeLabels = { 'task': '課題', 'test': 'テスト', 'other': 'その他' };
        const classMap = { 'task': 'major', 'test': 'required', 'other': 'general' };
        
        tasks.forEach((task, index) => {
            html += `
                <div class="task-entry" style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed #eee;">
                    <div style="flex: 1; text-align: left;">
                        <span class="badge ${classMap[task.type]}" style="margin-left:0; margin-right:4px;">${typeLabels[task.type]}</span>
                        <span style="font-weight: bold;">${task.text}</span>
                        \${task.memo ? \`<div style="font-size: 11px; color: #6b7280; margin-top: 2px; padding-left: 6px; border-left: 2px solid #d1d5db; word-break: break-all;">\${task.memo}</div>\` : ''}
                    </div>
                    <button class="btn-done" onclick="deleteTask(\${index})" style="margin-left: 8px;">完了</button>
                </div>`;
        });
        container.innerHTML = html;
    }
}

window.handleAddTask = function(type) {
    const input = document.getElementById(`task-input-${type}`);
    const memoInput = document.getElementById(`task-memo-${type}`);
    const value = input.value.trim();
    const memoValue = memoInput ? memoInput.value.trim() : '';
    if (!value) return;

    if (!tasksData[activeTaskDate]) tasksData[activeTaskDate] = [];
    tasksData[activeTaskDate].push({ text: value, type: type, memo: memoValue });
    
    input.value = '';
    if (memoInput) memoInput.value = '';
    renderTaskList();
    renderCalendar();
};

window.deleteTask = function(index) {
    tasksData[activeTaskDate].splice(index, 1);
    if (tasksData[activeTaskDate].length === 0) delete tasksData[activeTaskDate];
    renderTaskList();
    renderCalendar();
};

// --- 時間割処理・共通処理 ---
window.closeModal = function(id) { document.getElementById(id).style.display = 'none'; };

function updateSliderLabel(value) {
    const cat = categories[value];
    const labelSpan = document.getElementById('category-val');
    if (labelSpan) {
        labelSpan.innerText = cat;
        labelSpan.className = `badge ${categoryClasses[cat]}`;
    }
}

document.getElementById('category-slider').addEventListener('input', (e) => {
    updateSliderLabel(e.target.value);
});

// 時間割の描画（マスのなかに教室・メモを表示するよう修正）
function renderTimetable() {
    document.querySelectorAll('td[data-day]').forEach(td => {
        const day = td.getAttribute('data-day'), period = td.parentElement.getAttribute('data-period'), key = `${day}-${period}`, course = timetableData[key];
        if (course) {
            const totalAbs = course.absence + (course.lateness / 3), rem = Math.max(0, 5 - totalAbs);
            const remText = Number(rem.toFixed(2)), isDanger = rem <= 1;
            const alertMsg = rem < 0 ? "落単乙" : rem = 0 ? "絶対に学校に行け！！" : `あと "${remText}" 回欠席できます`;
            
            // ★教室（memo）があれば、授業名の下に薄い背景付きで表示する仕組みを追加
            const memoHtml = course.memo 
                ? `<div class="course-room" style="font-size: 10px; color: #4b5563; background: rgba(255,255,255,0.6); padding: 1px 4px; border-radius: 3px; display: inline-block; margin-top: 4px; font-weight: 500; word-break: break-all;">🚪 ${course.memo}</div>` 
                : '';

            td.innerHTML = `
                <div class="course-card ${categoryClasses[course.category]}">
                    <div onclick="openModal('${day}', ${period})">
                        <span class="category-badge">${course.category}</span>
                        <div class="course-name">${course.name}</div>
                        ${memoHtml}
                    </div>
                    <div class="absence-zone" style="flex-direction: column; align-items: stretch; gap: 4px;">
                        <div style="display: flex; justify-content: space-between;"><span>欠席: <b>${course.absence}</b>回</span>
                            <div class="btn-zone"><button onclick="changeCount('${key}','absence',-1)">-</button><button onclick="changeCount('${key}','absence',1)">+</button></div></div>
                        <div style="display: flex; justify-content: space-between;"><span>遅刻: <b>${course.lateness}</b>回</span>
                            <div class="btn-zone"><button onclick="changeCount('${key}','lateness',-1)">-</button><button onclick="changeCount('${key}','lateness',1)">+</button></div></div>
                        <div style="font-size: 9px; font-weight: bold; color: ${isDanger?'#dc2626':'inherit'}; text-align: center; padding-top: 2px;">${alertMsg}</div>
                    </div>
                </div>`;
        } else {
            td.innerHTML = `<button class="btn-add" onclick="openModal('${day}', ${period})">+ 追加</button>`;
        }
    });
}

window.changeCount = function(key, type, amt) {
    if (timetableData[key]) { timetableData[key][type] = Math.max(0, (timetableData[key][type] || 0) + amt); renderTimetable(); }
};

window.openModal = function(day, period) {
    activeTargetKey = `${day}-${period}`;
    document.getElementById('modal-title').innerText = `${day}曜日 ${period}限の授業設定`;
    
    const existing = timetableData[activeTargetKey], deleteBtn = document.getElementById('btn-delete');
    if (existing) {
        document.getElementById('course-name-input').value = existing.name;
        document.getElementById('course-memo-input').value = existing.memo || '';
        const catIndex = categories.indexOf(existing.category);
        document.getElementById('category-slider').value = catIndex;
        updateSliderLabel(catIndex);
        deleteBtn.style.display = 'block';
    } else {
        document.getElementById('course-name-input').value = '';
        document.getElementById('course-memo-input').value = '';
        document.getElementById('category-slider').value = 0;
        updateSliderLabel(0);
        deleteBtn.style.display = 'none';
    }
    document.getElementById('modal').style.display = 'flex';
};

document.getElementById('course-form').onsubmit = function(e) {
    e.preventDefault();
    timetableData[activeTargetKey] = {
        name: document.getElementById('course-name-input').value,
        category: categories[document.getElementById('category-slider').value],
        absence: timetableData[activeTargetKey] ? timetableData[activeTargetKey].absence : 0,
        lateness: timetableData[activeTargetKey] ? timetableData[activeTargetKey].lateness : 0,
        memo: document.getElementById('course-memo-input').value
    };
    closeModal('modal');
    renderTimetable();
};

document.getElementById('btn-delete').onclick = function() { delete timetableData[activeTargetKey]; closeModal('modal'); renderTimetable(); };

renderTimetable();
    </script>
</body>
</html>
